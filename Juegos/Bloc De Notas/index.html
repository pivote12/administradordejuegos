<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloc De Notas</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="../../shared-music.css?v=global1" />
</head>
<body>
  <div id="app">
    <section id="screenTitle" class="screen active">
      <div class="title-bg"></div>
      <div class="title-card card">
        <div class="logo-badge">📝</div>
        <h1 data-i18n="title">Bloc De Notas</h1>
        <p class="subtitle" data-i18n="subtitle">Anotá lo que quieras. Simple y rápido.</p>
        <button type="button" class="btn primary" id="btnPlay" data-i18n="play">Jugar</button>
        <a class="btn ghost" id="btnBackAdmin" href="../../index.html" data-i18n="backToAdmin">Volver al administrador</a>
      </div>
    </section>

    <section id="screenNotes" class="screen">
      <header class="world-header">
        <button type="button" class="btn icon" id="btnBackTitle">←</button>
        <h2 data-i18n="title">Bloc De Notas</h2>
        <button type="button" class="btn primary" id="btnSave" data-i18n="save">Guardar</button>
      </header>
      <div class="notes-wrap">
        <textarea id="notesArea" data-i18n-placeholder="placeholder" placeholder="Escribí tus anotaciones aquí..."></textarea>
      </div>
      <p class="hint saved-hint" id="savedHint" hidden data-i18n="saved">Guardado.</p>
    </section>
  </div>
  <script src="../../i18n.js"></script>
  
  <div class="now-playing" id="nowPlaying">
    <div class="now-playing-controls">
      <button type="button" class="music-btn" id="btnMusicStop" title="Pausar">▶</button>
      <button type="button" class="music-btn" id="btnMusicPrev" title="Anterior">⏮</button>
      <button type="button" class="music-btn" id="btnMusicNext" title="Siguiente">⏭</button>
    </div>
    <p class="now-playing-info">
      <span class="now-playing-label">Canción:</span>
      <span class="now-playing-title" id="nowPlayingTitle">—</span>
    </p>
  </div>
  <script src="../../shared-music.js?v=global1"></script>
  <script src="game.js"></script>
</body>
</html>
